            "@type": "Answer",
            "text": "Pixel- and token-level watermarks are robust against many casual transformations but remain fragile against targeted edits such as frequency-band filtering, re-encoding, rescaling, paraphrasing, and character substitution. Because robustness is not guaranteed, watermarking is best treated as one signal among several rather than as proof of origin."
